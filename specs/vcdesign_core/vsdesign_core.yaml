vcdesign_core:
  name: "Value Continuity Design"
  status: "immutable_reference"
  note: "This file expresses the irreducible core of VCDesign. Changes here are costly and rare."

  central_principle:
    statement: "When value becomes questionable, review criteria or stop. There is no other option."


  core_questions:
    - "Is value still continuous?"
    - "If not, what will be done?"

  allowed_responses:
    reconsider:
      meaning: "Judgment will be revisited."
    defer:
      meaning: "Judgment remains open."
    abandon:
      meaning: "Value continuity is explicitly abandoned."

  composition_rule:
    when_external_judgment_used:
      must_check: "Is this judgment safe to assume over time?"

  non_commitments:
    - no_required_method
    - no_required_process
    - no_required_implementation

  closure:
    statement: >
      This core defines unavoidable questions only.
      How to answer them is intentionally left open.
