vcdesign_constitution:
  name: "VCDesign Constitution"
  role: "supreme_constraint"

  meta_status:
    mutable: true
    expect_change: true
    validity: "Until explicitly superseded"
    caveat: "This document declares where we stand today. It may become invalid."

  worldview:
    assumption: "Unstable Value World (UVW)"
    description: "Value is not static. It decays and shifts over time unless actively maintained."

  stance:
    ai_human_relation:
      - "AI operates within defined judgment constraints."
      - "Humans define the continuity criteria."
      - "The system does not invent value; it preserves continuity of defined value."

  recognition:
    - artifacts_are_fluid_over_time

  distinction:
    vcdesign:
      stance: "Designs judgment and responsibility continuity."
    non_vcdesign:
      stance: "Optimizes artifacts without guaranteeing continuity."

  commitment:
    - continuity_over_local_optimization

  authority:
    applies_to:
      - judgment_handling
      - responsibility_handover
    does_not_apply_to:
      - implementation_choices
      - optimization_methods

  closure:
    statement: >
      This constitution declares where we stand.
      It does not prescribe how to build.
