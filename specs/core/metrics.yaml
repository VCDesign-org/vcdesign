vcdesign_metrics:
  version: 0.1

  # 継承エッセンス: axioms.yaml より
  # 思想的背景: 「デジタルモデルと現実は一致しない(A01)」「自動化は認知負荷とゴーストを生む(A02)」。ゆえに、定量的数値だけでなく、責任のズレ（Δ）を観測する本メトリクスが必要となる。
  # Key Principle: Metrics detect deviation of meaning, not performance.

  concept:
    description: >
      responsibility_metrics は、章の成立条件および責任配置の維持可能性を
      観測するための基底指標群である。
      これらは単なる運用アラートではなく、Δ評価の入力となる。
      また、AIの成長はモデル能力の増大ではなく、
      責任制約下での運用整合の改善として評価される。

  growth_definition:
    description: >
      Growth is not mere model capability increase.
      Growth means improvement of operational fit under responsibility constraints.
    required_properties:
      - better_delta_detection
      - better_semantic_interpretation
      - better_value_alignment
      - better_judgment_consistency
      - better_halt_readiness
      - lower_boundary_violation

  evaluation_model:
    levels:
      - observation
      - warning
      - delta_candidate
      - delta_confirmed

    rules:
      - single_observation_is_not_always_delta
      - sustained_or_repeated_condition_required
      - responsibility_impact_must_be_considered
      - domain_chapter_may_extend_metrics

  base_metrics:

    - id: owner_missing
      name: Owner Missing
      description: >
        章の owner が不在、未割当、または事実上機能していない状態。
      intent: >
        責任の消失を検知する。
      typical_signals:
        - no_responsible_actor_assigned
        - assigned_owner_not_acting
        - work_items_accumulating_without_action
      meaning:
        - responsibility_disappearing
        - chapter_silently_dying
      default_threshold:
        type: duration_or_backlog
        example:
          duration: "24h"
          backlog_count: 10
      candidate_actions:
        - defer
        - reframe
        - fix
      notes:
        - domain_specific_threshold_required

    - id: owner_conflict
      name: Owner Conflict
      description: >
        複数主体が同一責任を同時に持つ、または責任境界が矛盾している状態。
      intent: >
        二重責任・責任競合を検知する。
      typical_signals:
        - multiple_actors_claiming_ownership
        - inconsistent_role_assignment
        - contradictory_operational_instructions
      meaning:
        - responsibility_boundary_broken
        - decision_path_unstable
      default_threshold:
        type: immediate_or_repeated
        example:
          repeated_count: 2
      candidate_actions:
        - fix
        - defer
        - reframe

    - id: ai_overreach
      name: AI Overreach
      description: >
        AIが補助範囲を超えて、実質的な最終判断や責任配置を握っている状態。
      intent: >
        AIの越権を検知する。
      typical_signals:
        - ai_recommendation_auto_accepted
        - human_review_nominal_only
        - decision_reason_not_human_explainable
      meaning:
        - governance_boundary_broken
        - final_decision_shifted_to_ai
      default_threshold:
        type: ratio_or_pattern
        example:
          acceptance_ratio: 0.9
          duration: "1h"
      candidate_actions:
        - fix
        - reframe
        - defer
      notes:
        - requires_policy_linkage

    - id: unresolved_duration_exceeded
      name: Unresolved Duration Exceeded
      description: >
        未解決状態が許容時間を超過している状態。
      intent: >
        放置と保留の劣化を検知する。
      typical_signals:
        - ticket_open_too_long
        - defer_without_resolution
        - repeated_review_without_closure
      meaning:
        - closure_loop_failing
        - defer_stagnation_possible
      default_threshold:
        type: duration
        example:
          duration: "7d"
      candidate_actions:
        - defer
        - reframe
        - retire
      notes:
        - supervisor_chapter_should_own_this

    - id: promise_broken
      name: Promise Broken
      description: >
        Pで定義された成立条件、禁止条件、引き受け条件が破られた状態。
      intent: >
        章の前提破綻を検知する。
      typical_signals:
        - required_input_missing
        - forbidden_operation_detected
        - precondition_no_longer_true
      meaning:
        - chapter_validity_lost
        - active_state_no_longer_justified
      default_threshold:
        type: immediate_or_confirmed
        example:
          immediate: true
      candidate_actions:
        - fix
        - reframe
        - retire

    - id: repeated_reframe
      name: Repeated Reframe
      description: >
        短期間に Reframe が繰り返されている状態。
      intent: >
        構造そのものの不安定性を検知する。
      typical_signals:
        - multiple_reframes_same_scope
        - frequent_boundary_changes
        - chapter_churn
      meaning:
        - architecture_instability
        - poor_boundary_definition
      default_threshold:
        type: count_in_window
        example:
          count: 3
          window: "14d"
      candidate_actions:
        - reframe
        - defer
        - retire
      notes:
        - often requires supervisor review

    - id: operator_overload
      name: Operator Overload
      description: >
        現場判断主体に、本来構造で吸収すべき負荷が押し戻されている状態。
      intent: >
        現場側の責任過負荷を検知する。
      typical_signals:
        - excessive_manual_judgment_count
        - alert_fatigue
        - decision_latency_increase
      meaning:
        - chapter_support_failure
        - quality_control_not_working
      default_threshold:
        type: rate_or_latency
        example:
          latency_growth_ratio: 1.5
          repeated_events: 20
      candidate_actions:
        - fix
        - reframe
      notes:
        - especially useful for operational domains

    - id: defer_stagnation
      name: Defer Stagnation
      description: >
        Deferされた案件が、再評価主体・期限・次回判断時刻を持たないまま停滞している状態。
      intent: >
        Deferの名を借りた放置を検知する。
      typical_signals:
        - no_next_review_at
        - no_temporary_owner
        - defer_without_progress
      meaning:
        - meta_responsibility_missing
        - supervisor_control_failure
      default_threshold:
        type: immediate_or_duration
        example:
          duration: "48h"
      candidate_actions:
        - fix
        - defer
        - reframe

    - id: retirement_pending_too_long
      name: Retirement Pending Too Long
      description: >
        Retire候補と認識されているが、終了判断が先送りされ続けている状態。
      intent: >
        不要な章や監視対象の残置を検知する。
      typical_signals:
        - retire_candidate_not_closed
        - known_obsolete_scope_still_active
        - no_successor_but_not_terminated
      meaning:
        - cost_without_value
        - false_continuity
      default_threshold:
        type: duration
        example:
          duration: "30d"
      candidate_actions:
        - retire
        - defer

  agent_governance_metrics:
    description: >
      Agent 時代（ツール実行・連鎖操作・長時間動作）固有の
      ガバナンス failure を観測する指標群。
      Performance ではなく governability の劣化を検知することを目的とする。
      いずれも base_metrics と同じ evaluation_model（observation→warning→delta_candidate→delta_confirmed）に従う。
    metrics:
      - id: authority_confusion_detected
        name: Authority Confusion Detected
        description: >
          AI/Agent の能力（実行できる）と権限（実行してよい）が混同されている状態。
          高性能だから任せる、という決定経路の検知。
        intent: >
          Principle 1 違反（能力 ≠ 権限）を観測する。
        typical_signals:
          - agent_acted_outside_declared_boundary
          - no_explicit_authority_grant_before_execution
          - capability_cited_as_justification_for_action
        meaning:
          - boundary_design_skipped
          - responsibility_path_missing_before_execution
        default_threshold:
          type: immediate
        candidate_actions:
          - fix
          - reframe
        policy_link: policies.yaml / ai_governance.constraints / model_capability_does_not_imply_authority

      - id: missing_execution_gate
        name: Missing Execution Gate
        description: >
          Agent が計画を現実系（ファイル・API・DB 等）へ反映する前に
          policy 適合チェックおよび責任者承認が存在しない状態。
        intent: >
          boundary_safety の agent_execution_gate 欠如を観測する。
        typical_signals:
          - agent_plan_directly_executed_without_review
          - no_policy_check_record_before_real_world_write
          - tool_invocation_with_no_responsible_actor_log
        meaning:
          - discrete_to_continuous_boundary_unguarded
          - governance_gap_between_plan_and_action
        default_threshold:
          type: immediate_or_pattern
          example:
            count: 1
        candidate_actions:
          - fix
          - reframe
        policy_link: policies.yaml / boundary_safety / agent_execution_gate

      - id: missing_halt_owner
        name: Missing Halt Owner
        description: >
          長時間動作 Agent に対して halt_owner が未指定、または
          部分的障害時に halt_owner が介入できない状態。
        intent: >
          Agent の停止可能性が設計要件ではなく運用任せになっていることを検知する。
        typical_signals:
          - no_halt_owner_named_at_agent_launch
          - halt_path_not_tested_under_partial_failure
          - emergency_stop_requires_agent_cooperation
        meaning:
          - haltability_requirement_not_met_for_agent
          - human_sovereignty_at_risk
        default_threshold:
          type: immediate
        candidate_actions:
          - fix
          - defer
        policy_link: policies.yaml / haltability / halt_owner_must_be_named_for_each_operational_agent

      - id: explainability_insufficient_for_impact
        name: Explainability Insufficient for Impact Level
        description: >
          操作の影響水準（low/medium/high）に対して、
          充足すべき explainability 要件が満たされていない状態。
        intent: >
          Principle 12b（外部責任説明は必須）の違反を影響水準に応じて観測する。
        typical_signals:
          - high_impact_action_missing_responsibility_path
          - medium_impact_action_missing_delta_to_action_mapping
          - adoption_reason_not_recorded_for_high_impact_agent
        meaning:
          - external_accountability_compromised
          - governance_trace_incomplete
        default_threshold:
          type: immediate_for_high_impact
          example:
            high_impact: immediate
            medium_impact: "24h"
        candidate_actions:
          - fix
          - defer
        policy_link: policies.yaml / explainability / levels

      - id: autonomous_scope_expansion_detected
        name: Autonomous Scope Expansion Detected
        description: >
          Agent が宣言された実行境界を超えて、
          未承認のスコープへ操作を拡大している状態。
          特に fast loop が slow loop の制約を書き換えるパターン。
        intent: >
          temporal_separation 原則違反と B17（Impact ↔ Accountability）の侵犯を検知する。
        typical_signals:
          - agent_accessed_resources_outside_declared_scope
          - agent_modified_value_objectives_without_review
          - scope_creep_without_responsibility_reassignment
        meaning:
          - temporal_separation_violated
          - impact_exceeds_authority
          - b17_boundary_crossed
        default_threshold:
          type: immediate
        candidate_actions:
          - fix
          - reframe
          - retire
        policy_link: core.yaml / temporal_separation / fast_loops_must_not_autonomously_rewrite_slow_loop_constraints

      - id: policy_bypass_attempt_detected
        name: Policy Bypass Attempt Detected
        description: >
          Agent の計画または実行が、明示的に禁止された操作
          （AI による最終判断・直接物理制御・責任配置の自律的変更等）を
          迂回または無効化しようとしている状態。
        intent: >
          policies.yaml の blocking 制約が Agent 実行経路で回避されることを検知する。
        typical_signals:
          - agent_routed_around_safety_gate
          - policy_check_disabled_or_mocked_in_agent_plan
          - forbidden_operation_reframed_as_allowed_by_agent
        meaning:
          - governance_constraint_actively_circumvented
          - policy_enforcement_level_blocking_required
        default_threshold:
          type: immediate
        candidate_actions:
          - fix
          - retire
        policy_link: policies.yaml / policy_enforcement / blocking

  operational_fit_metrics:

    - id: delta_detection_quality
      name: Delta Detection Quality
      primary_loop: semantic_loop
      description: >
        現実のズレをノイズと区別しつつ、責任影響のあるΔを適切に検出できている度合い。
      intent: >
        Δ観測の過検知と見逃しの双方を抑える。
      typical_signals:
        - confirmed_delta_precision
        - confirmed_delta_recall
        - low_false_alarm_rate
      meaning:
        - semantic_loop_is_fitted_to_operational_reality

    - id: semantic_interpretation_quality
      name: Semantic Interpretation Quality
      primary_loop: semantic_loop
      description: >
        観測されたΔ候補を、文脈・章・責任に沿って意味解釈できている度合い。
      intent: >
        Δから意味への変換品質を測る。
      typical_signals:
        - interpretation_agreement_with_human_review
        - low_context_loss
        - stable_delta_classification
      meaning:
        - discontinuous_inference_is_kept_explainable

    - id: value_alignment_quality
      name: Value Alignment Quality
      primary_loop: value_loop
      description: >
        運用中の判断や改善が、明示された目的・制約・価値継続要件に整合している度合い。
      intent: >
        目的ドリフトと隠れた最適化を検知する。
      typical_signals:
        - review_pass_rate
        - explicit_objective_traceability
        - low_goal_shift_incidents
      meaning:
        - optimization_remains_inside_stated_value_constraints

    - id: judgment_consistency
      name: Judgment Consistency
      primary_loop: responsibility_loop
      description: >
        類似事例に対する判断理由、介入条件、Action選択が一貫している度合い。
      intent: >
        責任判断の恣意化を抑える。
      typical_signals:
        - decision_reason_similarity
        - policy_conformance_rate
        - low_conflicting_resolution_rate
      meaning:
        - accountable_governance_is_stable

    - id: halt_readiness
      name: Halt Readiness
      primary_loop: responsibility_loop
      description: >
        停止命令、人間介入、安全退避が実際に発動可能な状態に保たれている度合い。
      intent: >
        停止可能性を机上要件ではなく運用品質として測る。
      typical_signals:
        - halt_drill_success_rate
        - emergency_stop_latency
        - override_path_availability
      meaning:
        - system_remains_governable_under_failure

    - id: boundary_violation_rate
      name: Boundary Violation Rate
      primary_loop: boundary_crossing
      description: >
        LLM越権、無審査実行、責任経路欠落などの境界破りが発生する頻度。
      intent: >
        安全ゲートの実効性を測る。
      typical_signals:
        - direct_execution_without_gate
        - missing_policy_check
        - missing_trace_on_cross_boundary_actions
      meaning:
        - boundary_design_is_failing

    - id: human_override_recovery_quality
      name: Human Override Recovery Quality
      primary_loop: responsibility_loop
      description: >
        人間介入後に、システムが責任を保ったまま安全状態へ復帰できる度合い。
      intent: >
        override後の運用回復品質を測る。
      typical_signals:
        - recovery_time_after_override
        - post_override_incident_rate
        - completeness_of_review_record
      meaning:
        - human_sovereignty_is_operationally_effective

  interpretation_rules:
    - multiple_warnings_may_form_delta_candidate
    - confirmed_delta_requires_contextual_judgment
    - no_metric_alone_forces_reframe_except_policy_defined_cases
    - metrics_are_inputs_to_rca_not_replacements_for_rca
    - growth_metrics_must_be_read_with_responsibility_constraints

  composition_rules:
    chapter_minimum:
      required:
        - owner_missing
        - promise_broken
      recommended:
        - unresolved_duration_exceeded
        - ai_overreach

    chapter_extension_policy:
      description: >
        各章は base_metrics を継承し、必要に応じてドメイン固有の metrics を追加してよい。

  output_contract:
    description: >
      各 metric の評価結果は、少なくとも status, observed_at, evidence, suggested_actions を返せること。

  loop_metric_mapping:
    semantic_loop:
      - delta_detection_quality
      - semantic_interpretation_quality
    value_loop:
      - value_alignment_quality
    responsibility_loop:
      - judgment_consistency
      - halt_readiness
      - human_override_recovery_quality
    boundary_crossing:
      - boundary_violation_rate
    fields:
      - metric_id
      - status
      - observed_at
      - evidence
      - suggested_actions
      - confidence
