vcdesign_policies:
  version: 0.1

  # 継承エッセンス: constitution.yaml より
  # 最高原則: 「システムは法（仕様）の下にある」。AIの判断は常にこのポリシー（憲法）によって制約され、人間による「自己参照的修正」を最終権限とする。

  concept:
    description: >
      policies は、VCDesign Core の上での判断と責任配置に対して
      不可侵な制約とガイドラインを与える層である。
      これにより、AI・人・システムの境界と、
      Reframe / Defer / Retire の暴走を防ぐ。

  ai_governance:

    principle:
      description: >
        AIは判断を支援するが、責任を持たない。
        最終判断および責任配置は常に人間が担う。

    allowed:
      - analysis
      - pattern_detection
      - recommendation
      - anomaly_detection

    conditional_allowed:
      - auto_classification_with_review
      - prioritization_with_human_override

    forbidden:
      - final_decision
      - responsibility_assignment
      - reframe_execution
      - retire_execution

    constraints:
      - human_must_be_in_decision_loop
      - ai_output_must_be_explainable
      - ai_confidence_must_be_visible
      - llm_must_remain_within_semantic_loop
      - responsibility_trace_must_be_preserved
      - model_capability_does_not_imply_authority
      - agent_execution_requires_explicit_boundary
      - high_impact_ai_requires_governance_trace

    agent_era_note:
      description: >
        Agent 化（ツール実行・連鎖操作・長時間動作）は、
        モデルと異なり境界が操作ごとに発生する。
        能力の増大は権限の自動付与を意味しない。
        すべての実行境界に対して boundary_safety の制御が適用される。

  llm_placement:

    principle:
      description: >
        LLMは主としてSemantic Loopに配置される。
        解釈支援は許可されるが、物理制御・価値設定・最終責任の保持は許可されない。

    primarily_allowed_in:
      - semantic_loop

    forbidden_direct_control:
      - physical_loop
      - value_loop
      - responsibility_loop

    constraints:
      - llm_must_not_directly_control_physical_loop
      - llm_must_not_autonomously_set_value_objectives
      - llm_must_not_hold_final_authority
      - llm_outputs_require_explicit_gate_before_real_world_effect

  boundary_safety:

    principle:
      description: >
        非連続な推論結果を現実系へ接続するすべての境界は、
        安全ゲートと停止経路を備えなければならない。

    boundaries:
      continuous_to_discrete_boundary:
        required: true
        description: >
          現実信号をΔ候補および意味候補へ変換する境界。
      discrete_to_continuous_boundary:
        required: true
        description: >
          離散的な判断・推奨を実行系へ反映する前の制御境界。

    mandatory_controls:
      - safety_gate_required
      - human_override_required
      - halt_path_required
      - boundary_decision_logging_required
      - policy_check_before_execution
      - tool_using_agent_requires_execution_gate
      - agent_plan_must_not_bypass_policy_check

    agent_execution_gate:
      description: >
        ツール利用型 Agent が離散的な計画を現実系（ファイル・API・DB 等）へ
        反映する前に、policy 適合チェックと責任者承認が必要。
        「計画が合理的である」ことと「実行が許可されている」ことは別問題である。
      required_checks:
        - action_within_declared_boundary
        - responsible_actor_identified
        - reversibility_assessed
        - halt_path_confirmed

    anti_patterns:
      - direct_llm_to_actuator_path
      - silent_goal_rewrite
      - irreversible_action_without_review_gate
      - agent_plan_treated_as_execution_approval

  long_term_decision_gate:
    principle:
      description: >
        長期ループの判断は、人間の責任ループで閉じる。
        AIは分析、反対意見、スコアリング、代替案提示を行ってよいが、
        長期判断を最終確定してはならない。

    ai_allowed:
      - scenario_generation
      - risk_identification
      - lindy_check_support
      - competence_boundary_check_support
      - counterargument_generation
      - score_drafting

    ai_forbidden:
      - final_long_term_decision
      - irreversible_commitment
      - autonomous_structural_reframe
      - autonomous_responsibility_reassignment
      - autonomous_value_objective_change

    required_before_commit:
      - human_final_decider
      - explicit_bet_size
      - downside_review
      - competence_boundary_review
      - lindy_aspect_review
      - exit_condition
      - next_review_at
      - decision_log

    hard_stops:
      - fatal_downside_without_owner
      - low_trust_counterparty
      - outside_competence_circle_and_irreversible
      - non_lindy_action_and_irreversible
      - no_exit_condition
      - no_human_final_decider

    note: >
      これは既存の AIは判断を支援するが責任を持たない 方針と自然に接続できます。
      既存 policies でも、AIの final_decision、responsibility_assignment、reframe_execution、retire_execution は禁止されています。

  reframe_control:

    principle:
      description: >
        Reframe は責任構造を書き換える操作であり、
        強い制御対象とする。

    allowed_roles:
      - supervisor
      - domain_owner  # 例: maintenance_engineer（条件付き）

    required_conditions:
      - existing_chapter_not_sustainable
      - delta_repeated_or_confirmed
      - new_boundary_defined
      - new_owner_assigned
      - explanation_available

    scope_control:
      local_reframe:
        allowed: true
        description: >
          章内部またはローカルスコープの改善。
      structural_reframe:
        allowed: conditional
        requires:
          - supervisor_approval
          - explicit_record

    safety_rules:
      - reframe_must_not_leave_responsibility_unassigned
      - reframe_must_define_new_preconditions
      - reframe_must_define_exit_conditions

  defer_control:

    principle:
      description: >
        Defer は未解決の放置ではなく、
        責任付きでの上位移送である。

    required_fields:
      - defer_reason
      - next_review_at
      - temporary_owner

    constraints:
      - every_defer_must_have_owner
      - defer_must_have_deadline
      - defer_must_be_traceable

    escalation:
      max_duration:
        default: "7d"
      action_on_exceed:
        - supervisor_review
        - forced_resolution

    anti_patterns:
      - defer_without_owner
      - defer_without_next_review
      - repeated_defer_without_progress

  retire_control:

    principle:
      description: >
        Retire は価値継続を意図的に終了する操作であり、
        必ず説明可能でなければならない。

    required_conditions:
      - value_no_longer_needed
      - cost_not_justified
      - no_hidden_dependency
      - explanation_available

    required_actions:
      - record_reason
      - release_responsibility
      - notify_related_chapters

    constraints:
      - retire_must_not_break_active_dependencies
      - retire_must_be_reviewable

  responsibility_rules:

    invariants:
      - responsibility_must_not_disappear
      - every_chapter_must_have_owner
      - final_decider_must_be_human

    conflict_resolution:
      priority:
        - supervisor
        - final_decider
        - owner
      rule: >
        衝突時は上位責任者の判断を優先する

    reassignment:
      rules:
        - must_be_explicit
        - must_be_recorded
        - must_define_scope

  explainability:

    principle:
      description: >
        すべての章および判断は、
        人間が説明可能である必要がある。
        Agent Era においては、内部推論の完全な透明性は必須ではないが、
        外部責任説明（採用理由・実行履歴・責任経路・停止条件）は必須である。

    requirements:
      - decision_reason_must_exist
      - responsibility_path_must_be_traceable
      - delta_to_action_mapping_must_be_visible
      - boundary_translation_must_be_traceable

    levels:
      low_impact:
        description: >
          影響が局所的かつ可逆な操作。
        requires:
          - decision_reason_must_exist
      medium_impact:
        description: >
          複数ステップの実行、または外部システムへの書き込みを含む操作。
        requires:
          - decision_reason_must_exist
          - delta_to_action_mapping_must_be_visible
      high_impact:
        description: >
          不可逆な操作、組織外への影響、または権限境界付近の判断。
          Agent の長時間動作や multi-agent 連携を含む。
        requires:
          - decision_reason_must_exist
          - delta_to_action_mapping_must_be_visible
          - responsibility_path_must_be_traceable
          - halt_condition_must_be_defined
          - adoption_reason_must_be_recorded

    impact_classification_note: >
      影響水準は responsible actor が事前に宣言し、
      supervisorが承認する。未宣言の操作は high_impact として扱う。

    failure_definition:
      description: >
        説明不能な状態は、価値継続不能とみなす。
        特に high_impact 操作で責任経路が追跡不能な場合は即時 blocking。

  lifecycle_governance:

    principle:
      description: >
        章は状態を持ち、放置されてはならない。

    constraints:
      - drifting_must_be_evaluated
      - deferred_must_be_reviewed
      - retired_must_be_recorded

    anti_patterns:
      - infinite_active_without_review
      - infinite_deferred
      - hidden_retired

  supervisor_role:

    principle:
      description: >
        Supervisorは責任の最終収束点であり、
        責任の消失を防ぐ。

    responsibilities:
      - accept_deferred_cases
      - approve_reframe
      - approve_retire
      - resolve_conflicts
      - enforce_policies

    constraints:
      - supervisor_must_not_delegate_final_decision_to_ai
      - supervisor_must_close_or_reassign_every_case

  haltability:

    principle:
      description: >
        停止可能性はオプションではなく責任統治の成立条件である。

    required_capabilities:
      - human_intervention_possible
      - arbitrary_halt_possible
      - decision_accountability_traceable
      - rollback_or_safe_state_defined

    rules:
      - every_operational_path_must_have_halt_owner
      - emergency_stop_must_bypass_nonessential_automation
      - human_override_must_be_executable_under_degraded_conditions
      - post_halt_review_must_record_reason_and_responsibility
      - halt_must_remain_possible_during_partial_agent_failure
      - halt_owner_must_be_named_for_each_operational_agent

    agent_haltability_note:
      description: >
        長時間動作 Agent は「起動時に停止可能か」を設計要件として確認する。
        部分的な Agent 障害（ツール応答なし・ループ検出等）の状態でも
        halt_owner が介入できる経路を保持しなければならない。
        halt_owner は Agent 起動前に named かつ operational でなければならない。

  policy_enforcement:

    levels:
      - advisory
      - warning
      - blocking

    examples:
      ai_final_decision:
        level: blocking
      llm_direct_physical_control:
        level: blocking
      missing_halt_path:
        level: blocking
      missing_owner:
        level: blocking
      missing_explanation:
        level: warning

    principle:
      description: >
        ポリシー違反は、単なるログではなく、
        遷移制御に影響を与える。
