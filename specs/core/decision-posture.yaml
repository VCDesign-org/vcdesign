# VCDesign Core: Decision Posture (The Response)
# This file defines the irreducible Core of VCDesign.
# "When in doubt, stop or review."
# 日本語要約: 実行時の判断姿勢を定義し、禁止条件の適用元を参照する。

id: "vcdesign-core-decision-posture"
title: "Decision Posture (Stop or Review)"
layer: "core"
status: "stable"
version: "2.1.0"
license: "MIT"

meta:
  principle: "The Safety of Pause"
  role: "Constraint"
  note: "This core defines unavoidable questions only. Concrete procedures belong to implementation layers."

# -------------------------------------------------------------------
# The Central Principle
# -------------------------------------------------------------------
central_principle:
  statement: "When value becomes questionable, review criteria or stop. There is no other option."
  imperative: "Do not proceed blindly."

# -------------------------------------------------------------------
# Core Questions (The Unavoidable Check)
# -------------------------------------------------------------------
core_questions:
  - "Is value still continuous?"
  - "If not, what will be done?"

# -------------------------------------------------------------------
# Enforcement Reference (Normative Source)
# -------------------------------------------------------------------
# Single source of truth for start/operation prohibitions:
# specs/core/constitution.yaml (VC-X-001..003)
enforcement_ref:
  source: "./constitution.yaml"
  applies:
    - "VC-X-001"
    - "VC-X-002"
    - "VC-X-003"

# -------------------------------------------------------------------
# Structural Consequence: Explicit Verification
# -------------------------------------------------------------------
structural_consequence:
  - "To answer core questions, the system must have explicit points of verification."
  - "Implicit assumptions must be halted until explicated."
  - "Validation cannot be continuous everywhere; it must be discrete and placed effectively."

# -------------------------------------------------------------------
# Allowed Responses (The only valid states)
# -------------------------------------------------------------------
allowed_responses:
  commit:
    meaning: "Continuity is affirmed under current criteria."
    action: "Proceed with explicit responsibility."

  reconsider:
    meaning: "Judgment will be revisited."
    action: "Re-open criteria and assumptions."

  defer:
    meaning: "Judgment is not executed now; it is explicitly deferred."
    action: "Preserve accountability and wait for required input."

  abandon:
    meaning: "Value continuity is explicitly abandoned."
    action: "Stop the current line of execution with explicit accountability."


# -------------------------------------------------------------------
# Non-Commitments (What we do NOT prescribe)
# -------------------------------------------------------------------
non_commitments:
  - "No required specific method (e.g. Agile, Waterfall)"
  - "No required implementation language"
  - "No required process framework"
