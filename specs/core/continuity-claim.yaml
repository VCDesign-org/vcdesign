# VCDesign Core: Continuity Claim (The Stance)
# This file defines our mutable stance: "We choose to claim continuity."

id: "vcdesign-core-continuity-claim"
title: "Continuity Claim"
layer: "core"
status: "draft"
version: "2.1.0"

meta:
  role: "Worldview / Stance"
  validity: "Until explicitly superseded"
  caveat: "This document declares where we stand today."

# -------------------------------------------------------------------
# Worldview Assumption
# -------------------------------------------------------------------
worldview:
  assumption: "Unstable Value World (UVW)"
  description: "Value is not static. It decays and shifts over time unless actively maintained."
  refers_to: "./axioms.yaml"
  also_refers_to: "./decision-posture.yaml"

# -------------------------------------------------------------------
# The Stance (Continuity over Optimization)
# -------------------------------------------------------------------
stance:
  statement: "We prioritize the Continuity of Value over local optimization."
  
  commitments:
    - "Value continuity must be designed, not just hoped for."
    - "Judgments must have owners (Responsible Parties)."
    - "Optimization without continuity is considered a failure."

# -------------------------------------------------------------------
# Automation / Human Relation
# -------------------------------------------------------------------
automation_human_relation:
  - "Highly automated components operate within defined judgment constraints."
  - "Humans define continuity criteria."
  - "The system does not invent value; it preserves continuity of defined value."
  - "Automation must remain accountable to explicit judgment governance."

# -------------------------------------------------------------------
# Distinctions
# -------------------------------------------------------------------
distinction:
  vcdesign_compliant:
    stance: "Designs judgment and responsibility continuity."
  non_compliant:
    stance: "Optimizes artifacts without guaranteeing continuity checks."
