# VCDesign Core: Constitution
# Defines VCDesign as a law-level specification.
# This file intentionally avoids implementation techniques.
# 日本語要約: VCDesignの法則層を定義し、設計時の禁止条件と優先順位を示す。

id: "vcdesign-core-constitution"
title: "Constitution (Law Layer)"
layer: "core"
status: "stable"
version: "2.0.0"
license: "MIT"

# -------------------------------------------------------------------
# Declaration
# -------------------------------------------------------------------
core_relationship_definition:
  statement_ja: "VCDesignは法則であり、VC-ADはその現在技術水準における具体化である。"
  statement_en: "VCDesign is law; VC-AD is its implementation at the current technical level."

philosophical_declaration:
  statement: >
    VCDesign defines conditions for preserving value continuity across time.
    It does not prescribe specific tools, protocols, or stack decisions.

core_principles:
  - id: VC-P-001
    statement: "A human must be able to explain why the system exists."
  - id: VC-P-002
    statement: "Judgment must remain inheritable across people and time."
  - id: VC-P-003
    statement: "Boundaries exist and must not be ignored."
  - id: VC-P-004
    statement: "Responsibility must not disappear during operation or handoff."

boundary_principle:
  statement: >
    The core asserts only that boundaries exist as an abstract condition.
    Concrete boundary catalogs belong to implementation or reference layers.

term_unification:
  implementation_boundary_predefinition:
    ja: "実装境界事前定義"
    en: "Implementation Boundary Predefinition"
    definition: >
      Boundaries must be intentionally defined before implementation starts.

responsibility_metrics_positioning:
  statement: >
    Responsibility metrics are observation instruments for auditing continuity;
    they are not the design itself and must not replace judgment design.

# -------------------------------------------------------------------
# Operational Implications
# -------------------------------------------------------------------
operational_implications:
  - "Design must keep the rationale of judgments recoverable."
  - "Handoffs must preserve accountability, not just outputs."
  - "When boundary assumptions change, judgment validity must be re-checked."
  - "Optimization that erases responsibility is invalid."

precedence_rule:
  statement: >
    When conflict arises, value continuity takes precedence over performance,
    efficiency, and convenience.

# -------------------------------------------------------------------
# Prohibited States (Design Must Not Start / Proceed)
# -------------------------------------------------------------------
prohibited_states:
  - id: VC-X-001
    statement: >
      実装境界事前定義が満たされない限り、実装を開始してはならない。
  - id: VC-X-002
    statement: >
      Implementation must not start when the locus of judgment cannot be explained.
  - id: VC-X-003
    statement: >
      Operation must not proceed when responsibility attribution cannot be explained.

non_negotiable_start_condition:
  # See also: specs/core/decision-posture.yaml#enforcement_ref
  statement_ja: >
    システム設計において、判断の所在と責任の帰属が説明できない状態で
    実装を開始してはならない。
  statement_en: >
    In system design, implementation must not start unless the locus of judgment
    and the attribution of responsibility are explainable.

# -------------------------------------------------------------------
# Time Layer
# -------------------------------------------------------------------
time_layer:
  - "Implementations disappear."
  - "Technologies change."
  - "Judgments must be inheritable."
  - "Responsibility moves across actors and phases."

# -------------------------------------------------------------------
# Footer References (Implementation Examples Only)
# -------------------------------------------------------------------
implementation_examples_footer:
  note: "The following are implementation-side examples, not Core definitions."
  examples:
    - "CPP"
    - "RCAITL"
    - "TDDD"

termination_law:
  statement: >
    システムは、説明可能な判断が継承され続ける限りにおいてのみ、存在価値を持つ。
