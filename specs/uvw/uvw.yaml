uvw_definition:
  name: "Unstable Value World (UVW)"
  nature: "Problem Space"
  upstream: "https://github.com/unstable-value-world/unstable-value-world"
  role: "The observable condition of the world VCDesign assumes."
  
  core_condition:
    - "Value is not static."
    - "Judgments decay over time."
    - "Meaning shifts when context shifts."

  implication:
    - "No system can guarantee permanent correctness."
    - "Continuity requires active maintenance."

  status: "Axiomatic"
