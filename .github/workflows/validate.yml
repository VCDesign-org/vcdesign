name: Validate Specs

on:
  push:
    paths:
      - 'specs/**/*.yaml'
      - 'specs/**/*.json'
      - 'README.md'
      - 'specs/map.md'
      - 'site/**/*.html'
  pull_request:
    paths:
      - 'specs/**/*.yaml'
      - 'specs/**/*.json'
      - 'README.md'
      - 'specs/map.md'
      - 'site/**/*.html'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate YAML files
        run: |
          which yamllint || pip install yamllint
          yamllint -c .yamllint specs/**/*.yaml
      - name: Validate docs and legacy notices
        run: bash .github/scripts/validate_docs.sh
